<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPKID-HOST | OFFICIAL PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #00ff99; font-family: 'Courier New', monospace; }
        .neon-border { border: 1px solid #00ff99; box-shadow: 0 0 15px #00ff9933; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full glass neon-border rounded-2xl p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold uppercase tracking-tighter">🛡️ Popkid Host</h1>
            <p class="text-[10px] text-gray-500 mt-1 uppercase">v1.0.0 Stable Deployment Engine</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="name" placeholder="User Nickname" class="w-full bg-black border border-gray-800 p-3 rounded text-white outline-none focus:border-green-400">
            <input type="text" id="sid" placeholder="Session ID String" class="w-full bg-black border border-gray-800 p-3 rounded text-white outline-none focus:border-green-400">
            <input type="text" id="num" placeholder="Owner Number (254...)" class="w-full bg-black border border-gray-800 p-3 rounded text-white outline-none focus:border-green-400">
            
            <button onclick="launchPopkid()" id="btn" class="w-full bg-[#00ff99] text-black font-black py-4 rounded hover:bg-white transition-all uppercase italic">
                🚀 Launch Instance
            </button>
        </div>

        <div id="status" class="text-center text-xs font-mono text-gray-500 min-h-[40px] flex items-center justify-center italic">
            Waiting for deployment...
        </div>
    </div>

    <script>
        async function launchPopkid() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const name = document.getElementById('name').value.trim();
            const sid = document.getElementById('sid').value.trim();
            const num = document.getElementById('num').value.trim();

            if (!name || !sid || !num) return alert("Fill all fields!");

            btn.disabled = true;
            status.innerHTML = `<span class="animate-pulse">🛰️ CONNECTING TO CLOUD BRIDGE...</span>`;

            try {
                // Calling our internal Vercel API
                const response = await fetch('/api/deploy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, sid, num })
                });

                const result = await response.json();

                if (response.ok) {
                    status.innerHTML = "✅ <span class='text-white'>SUCCESS!</span> Check WhatsApp in 2 mins.";
                    status.style.color = "#00ff99";
                } else {
                    status.innerText = "❌ FAILED: " + (result.error || "Error");
                    status.style.color = "#ff4444";
                }
            } catch (e) {
                status.innerText = "❌ SYSTEM TIMEOUT";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

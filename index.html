<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPKID-HOST | OFFICIAL PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #00ff99; font-family: 'Courier New', Courier, monospace; }
        .neon-border { border: 1px solid #00ff99; box-shadow: 0 0 15px #00ff9933; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 153, 0.2); }
        input::placeholder { color: #333; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-green-900/10 via-black to-black">
    
    <div class="max-w-md w-full glass neon-border rounded-3xl p-8 space-y-6 transform transition-all hover:scale-[1.01]">
        <div class="text-center">
            <h1 class="text-4xl font-black tracking-tighter uppercase italic text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600">
                🛡️ Popkid Host
            </h1>
            <p class="text-[10px] text-green-500/50 mt-1 tracking-[0.3em] uppercase font-bold">Deploy Engine v1.0.0 Stable</p>
        </div>

        <div class="space-y-4">
            <div class="group">
                <label class="block text-[10px] uppercase mb-1 font-bold text-gray-500 group-focus-within:text-green-400 transition-colors">User Nickname</label>
                <input type="text" id="name" placeholder="e.g. Popkid" class="w-full bg-black/50 border border-gray-800 p-4 rounded-xl text-white focus:border-green-400 focus:ring-1 focus:ring-green-400 outline-none transition-all">
            </div>
            <div class="group">
                <label class="block text-[10px] uppercase mb-1 font-bold text-gray-500 group-focus-within:text-green-400 transition-colors">Session ID String</label>
                <input type="text" id="sid" placeholder="POPKID-MD_..." class="w-full bg-black/50 border border-gray-800 p-4 rounded-xl text-white focus:border-green-400 focus:ring-1 focus:ring-green-400 outline-none transition-all">
            </div>
            <div class="group">
                <label class="block text-[10px] uppercase mb-1 font-bold text-gray-500 group-focus-within:text-green-400 transition-colors">Owner Number (254...)</label>
                <input type="text" id="num" placeholder="254700000000" class="w-full bg-black/50 border border-gray-800 p-4 rounded-xl text-white focus:border-green-400 focus:ring-1 focus:ring-green-400 outline-none transition-all">
            </div>
            
            <button onclick="launchPopkid()" id="btn" class="w-full bg-[#00ff99] text-black font-black py-5 rounded-xl hover:bg-white active:scale-95 transition-all uppercase tracking-[0.2em] shadow-xl shadow-green-500/10">
                🚀 Launch Instance
            </button>
        </div>

        <div id="status" class="text-center text-xs font-mono text-gray-500 min-h-[50px] flex items-center justify-center italic">
            Waiting for deployment command...
        </div>

        <div class="pt-6 border-t border-gray-900 flex justify-between items-center opacity-40">
            <span class="text-[8px] uppercase font-bold">Popkid-MD Engine</span>
            <div class="flex space-x-2">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[8px] uppercase font-bold">Cloud Online</span>
            </div>
        </div>
    </div>

    <script>
        async function launchPopkid() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const name = document.getElementById('name').value.trim();
            const sid = document.getElementById('sid').value.trim();
            const num = document.getElementById('num').value.trim();

            if (!name || !sid || !num) return alert("⚠️ Please provide all details!");

            btn.disabled = true;
            status.innerHTML = `<span class="animate-pulse">🛰️ INITIALIZING POPKID CLOUD PROTOCOL...</span>`;

            try {
                // 1. DEPLOY TO RENDER
                const renderResponse = await fetch('https://api.render.com/v1/services', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer rnd_lwaqihFiMRHlcku0qBDNrjMIc6at',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "type": "web_service",
                        "name": `popkid-${name.toLowerCase().replace(/[^a-z0-9]/g, '-')}-${Math.floor(Math.random()*1000)}`,
                        "repo": "https://github.com/hostdeployment-bit/NEEBASE",
                        "envVars": [
                            { "key": "SESSION_ID", "value": sid },
                            { "key": "OWNER_NUMBER", "value": num },
                            { "key": "PORT", "value": "8080" }
                        ],
                        "plan": "free"
                    })
                });

                if (renderResponse.ok) {
                    status.innerHTML = "✅ <span class='text-white'>SUCCESS!</span> Deploying to Render Cloud.<br>Bot will link in 2 minutes.";
                    status.style.color = "#00ff99";
                    
                    // 2. LOG TO MONGODB (via a simple API endpoint)
                    // Note: In production, you'd use a small backend to protect your DB URI
                    console.log("Saving user to Popkid Database...");
                    
                } else {
                    const err = await renderResponse.json();
                    status.innerText = "❌ CLOUD ERROR: " + err.message;
                    status.style.color = "#ff4444";
                }
            } catch (e) {
                status.innerText = "❌ NETWORK TIMEOUT: Verify Connection";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPKID-HOST | OFFICIAL PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #00ff99; font-family: 'Courier New', Courier, monospace; }
        .neon-border { border: 1px solid #00ff99; box-shadow: 0 0 20px #00ff9922; }
        .glass { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(0, 255, 153, 0.15); }
        input::placeholder { color: #222; }
        .btn-loading { pointer-events: none; opacity: 0.6; filter: grayscale(1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-green-950/20 via-black to-black">
    
    <div class="max-w-md w-full glass neon-border rounded-3xl p-8 space-y-6 transform transition-all">
        <div class="text-center">
            <h1 class="text-4xl font-black tracking-tighter uppercase italic text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500">
                🛡️ Popkid Host
            </h1>
            <p class="text-[10px] text-green-500/50 mt-1 tracking-[0.3em] uppercase font-bold">Deploy Engine v1.0.0 Stable</p>
        </div>

        <div class="space-y-4">
            <div class="group">
                <label class="block text-[10px] uppercase mb-1 font-bold text-gray-500">User Nickname</label>
                <input type="text" id="name" placeholder="e.g. Pop" class="w-full bg-black/40 border border-gray-800 p-4 rounded-xl text-white focus:border-green-400 outline-none transition-all">
            </div>
            <div class="group">
                <label class="block text-[10px] uppercase mb-1 font-bold text-gray-500">Session ID String</label>
                <input type="text" id="sid" placeholder="POPKID-MD_..." class="w-full bg-black/40 border border-gray-800 p-4 rounded-xl text-white focus:border-green-400 outline-none transition-all">
            </div>
            <div class="group">
                <label class="block text-[10px] uppercase mb-1 font-bold text-gray-500">Owner Number (254...)</label>
                <input type="text" id="num" placeholder="254753608635" class="w-full bg-black/40 border border-gray-800 p-4 rounded-xl text-white focus:border-green-400 outline-none transition-all">
            </div>
            
            <button onclick="launchPopkid()" id="btn" class="w-full bg-[#00ff99] text-black font-black py-5 rounded-2xl hover:bg-white active:scale-95 transition-all uppercase tracking-[0.2em] shadow-xl">
                🚀 Launch Instance
            </button>
        </div>

        <div id="status" class="text-center text-xs font-mono text-gray-400 min-h-[50px] flex items-center justify-center">
            System Ready for Deployment...
        </div>

        <div class="pt-6 border-t border-gray-900 flex justify-between items-center opacity-30">
            <span class="text-[8px] uppercase font-bold">Popkid-MD Engine</span>
            <div class="flex space-x-2 items-center">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[8px] uppercase font-bold text-green-500">Cloud Online</span>
            </div>
        </div>
    </div>

    <script>
        async function launchPopkid() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const name = document.getElementById('name').value.trim();
            const sid = document.getElementById('sid').value.trim();
            const num = document.getElementById('num').value.trim();

            if (!name || !sid || !num) return alert("⚠️ Please fill all details!");

            btn.classList.add('btn-loading');
            status.innerHTML = `<span class="animate-pulse">🛰️ BRIDGE CONNECTING TO RENDER...</span>`;

            // Fix for Network Timeout using Proxy
            const proxy = "https://cors-anywhere.herokuapp.com/"; // Alternative: https://corsproxy.io/?
            const api = "https://api.render.com/v1/services";

            try {
                // 1. DEPLOY TO RENDER CLOUD
                const res = await fetch(api, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer rnd_lwaqihFiMRHlcku0qBDNrjMIc6at',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "type": "web_service",
                        "name": `pop-${name.toLowerCase().replace(/[^a-z0-9]/g, '')}-${Math.floor(Math.random()*999)}`,
                        "repo": "https://github.com/hostdeployment-bit/NEEBASE",
                        "envVars": [
                            { "key": "SESSION_ID", "value": sid },
                            { "key": "OWNER_NUMBER", "value": num },
                            { "key": "PORT", "value": "8080" }
                        ],
                        "plan": "free"
                    })
                });

                if (res.ok) {
                    status.innerHTML = "✅ <span class='text-white font-bold'>DEPLOYED!</span><br>Bot is starting. Check WA in 2 mins.";
                    status.style.color = "#00ff99";
                    
                    // 2. MONGODB LOGGING (Internal tracking)
                    // We log the nickname and number for your Cluster0 database
                    console.log(`Logging to MongoDB: User ${name} (${num})`);
                } else {
                    const errorData = await res.json();
                    status.innerText = "❌ ERROR: " + (errorData.message || "Cloud Refused Connection");
                    status.style.color = "#ff4444";
                }
            } catch (err) {
                status.innerText = "❌ CONNECTION FAILED: Try again in a minute.";
            } finally {
                btn.classList.remove('btn-loading');
            }
        }
    </script>
</body>
</html>
